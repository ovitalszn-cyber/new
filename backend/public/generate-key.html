<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KashRock API - Generate API Key</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .logo p {
            color: #6b7280;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #374151;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 24px;
            padding: 20px;
            background: #f0fdf4;
            border: 2px solid #86efac;
            border-radius: 8px;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h3 {
            color: #166534;
            font-size: 18px;
            margin-bottom: 12px;
        }

        .key-display {
            background: white;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            word-break: break-all;
            color: #1f2937;
            border: 1px solid #d1d5db;
            margin-bottom: 12px;
        }

        .copy-btn {
            padding: 8px 16px;
            background: #166534;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .copy-btn:hover {
            background: #14532d;
        }

        .warning {
            margin-top: 12px;
            padding: 12px;
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            border-radius: 4px;
            font-size: 13px;
            color: #92400e;
        }

        .error {
            margin-top: 24px;
            padding: 16px;
            background: #fee2e2;
            border: 2px solid #fca5a5;
            border-radius: 8px;
            color: #991b1b;
            display: none;
        }

        .error.show {
            display: block;
        }

        .docs-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
        }

        .docs-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .docs-link a:hover {
            color: #764ba2;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🔑 KashRock API</h1>
            <p>Generate your API key instantly</p>
        </div>

        <form id="keyForm">
            <div class="form-group">
                <label for="name">Key Name (Optional)</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    placeholder="e.g., My Production Key"
                    autocomplete="off"
                >
            </div>

            <div class="form-group">
                <label for="email">Email (Optional)</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="your@email.com"
                    autocomplete="email"
                >
            </div>

            <button type="submit" class="btn" id="submitBtn">
                Generate API Key
            </button>
        </form>

        <div class="result" id="result">
            <h3>✅ API Key Generated!</h3>
            <div class="key-display" id="keyDisplay"></div>
            <button class="copy-btn" id="copyBtn">📋 Copy to Clipboard</button>
            <div class="warning">
                ⚠️ <strong>Important:</strong> Save this key now! You won't be able to see it again.
            </div>
        </div>

        <div class="error" id="error">
            <strong>Error:</strong> <span id="errorMessage"></span>
        </div>

        <div class="docs-link">
            <a href="/docs" target="_blank">📚 View API Documentation</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('keyForm');
        const submitBtn = document.getElementById('submitBtn');
        const result = document.getElementById('result');
        const error = document.getElementById('error');
        const keyDisplay = document.getElementById('keyDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const errorMessage = document.getElementById('errorMessage');

        let generatedKey = '';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Hide previous results
            result.classList.remove('show');
            error.classList.remove('show');
            
            // Get form values
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Generating...';
            
            try {
                const response = await fetch('/v1/public/generate-key', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: name || 'My API Key',
                        email: email || null
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    generatedKey = data.api_key;
                    keyDisplay.textContent = generatedKey;
                    result.classList.add('show');
                    
                    // Clear form
                    form.reset();
                } else {
                    throw new Error(data.detail || 'Failed to generate API key');
                }
            } catch (err) {
                errorMessage.textContent = err.message;
                error.classList.add('show');
            } finally {
                // Reset button
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Generate API Key';
            }
        });

        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(generatedKey);
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => {
                    copyBtn.textContent = '📋 Copy to Clipboard';
                }, 2000);
            } catch (err) {
                alert('Failed to copy to clipboard. Please copy manually.');
            }
        });
    </script>
</body>
</html>
